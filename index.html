<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#2e6e38">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<link rel="icon" type="image/png" href="./favicon.png">

<style>
:root{--bg:#daebd4;--bg2:#c8dfbf;--bg3:#b8d3ae;--surface:#e8f3e3;--text:#1a2e16;--text2:#4a6644;--text3:#82a67a;--accent:#2e6e38;--border:#8fba84;--border2:#6fa063;--danger:#c0392b;--radius:16px;--rsm:10px;--font:-apple-system,'Pretendard','Apple SD Gothic Neo',sans-serif}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);font-family:var(--font);color:var(--text);font-size:15px}
.app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;border-left:1.5px solid var(--border2);border-right:1.5px solid var(--border2);background:var(--bg)}
.screen{display:none;flex:1;flex-direction:column}.screen.active{display:flex}
button{font-family:var(--font);cursor:pointer;border:none;background:none}
input,textarea{font-family:var(--font);color:var(--text)}
.header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1.5px solid var(--border2);background:var(--bg2);position:sticky;top:0;z-index:10}
.header-title{font-size:20px;font-weight:700;letter-spacing:-.3px;text-align:center}
.header-sub{font-size:12px;color:var(--text2);margin-top:2px;text-align:center}
.header-left{display:flex;align-items:center}
.header-right{display:flex;align-items:center}
.header-book-img{height:48px;width:auto;object-fit:contain}
.back-btn{display:flex;align-items:center;gap:4px;font-size:14px;color:var(--accent);font-weight:600;padding:4px 0}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#aaa;display:inline-block;margin-left:6px;vertical-align:middle;transition:background .3s}
.sync-dot.ok{background:#3a3}.sync-dot.syncing{background:#fa0;animation:blink .7s infinite}.sync-dot.err{background:#e33}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.list-body{flex:1;overflow-y:auto;padding:14px 14px 100px;display:flex;flex-direction:column;gap:10px}
.book-row{display:flex;align-items:center;gap:14px;padding:12px 14px;border:1.5px solid var(--border2);border-radius:var(--radius);background:var(--surface);cursor:pointer;transition:background .15s}
.book-row:active{background:var(--bg3)}
.book-thumb{width:46px;height:62px;border-radius:6px;background:var(--bg2);border:1.5px solid var(--border);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:22px}
.book-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.book-row-info{flex:1;min-width:0}
.book-row-title{font-size:15px;font-weight:600;letter-spacing:-.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.book-row-author{font-size:12px;color:var(--text2);margin-top:3px}
.book-row-meta{font-size:11px;color:var(--text3);margin-top:4px}
.book-row-arrow{color:var(--text3);font-size:18px}
.fab{position:fixed;bottom:28px;right:50%;transform:translateX(50%);max-width:calc(480px - 40px);width:calc(100% - 40px);background:var(--accent);color:#fff;border-radius:14px;padding:15px;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;border:1.5px solid var(--border2);box-shadow:0 4px 16px rgba(46,110,56,.3);z-index:20}
.fab:active{opacity:.85}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:10px}
.empty-state .big-icon{font-size:48px;margin-bottom:8px}
.empty-state p{font-size:14px;text-align:center;line-height:1.6;color:var(--text2)}
.loading-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:var(--text2)}
.detail-body{flex:1;overflow-y:auto;padding-bottom:40px}
.cover-section{padding:16px 14px;display:flex;gap:14px;align-items:flex-start;background:var(--bg2);border-bottom:1.5px solid var(--border2)}
.cover-upload{width:88px;height:118px;border-radius:10px;background:var(--bg3);border:1.5px dashed var(--border2);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;position:relative;cursor:pointer}
.cover-upload img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.cover-upload input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.cover-hint{font-size:10px;color:var(--text3);text-align:center;line-height:1.5;z-index:1;pointer-events:none}
.cover-hint-icon{font-size:20px;margin-bottom:4px}
.book-fields{flex:1;display:flex;flex-direction:column;gap:12px}
.field-block{display:flex;flex-direction:column;gap:4px}
.field-label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.6px;text-transform:uppercase}
.field-input{font-size:15px;border:none;outline:none;background:none;border-bottom:1.5px solid var(--border);padding:4px 0 6px;width:100%;color:var(--text)}
.field-input::placeholder{color:var(--text3)}
.field-input.title{font-size:17px;font-weight:700}
.field-input:focus{border-bottom-color:var(--accent)}
.tab-bar{display:flex;border-bottom:1.5px solid var(--border2);background:var(--bg2);padding:0 14px}
.tab-btn{flex:1;padding:12px 0;font-size:14px;font-weight:600;color:var(--text3);border-bottom:2.5px solid transparent;margin-bottom:-1.5px;transition:color .15s,border-color .15s}
.tab-btn.on{color:var(--accent);border-bottom-color:var(--accent)}
.tab-pane{display:none;padding:0 14px}.tab-pane.on{display:block}
.memo-input-wrap{padding:14px 0 0;position:relative}
.memo-textarea{width:100%;min-height:90px;background:var(--surface);border:1.5px solid var(--border2);border-radius:var(--rsm);padding:12px 12px 40px;font-size:16px;line-height:1.7;resize:none;outline:none;color:var(--text);transition:border-color .15s}
.memo-textarea:focus{border-color:var(--accent)}
.memo-textarea::placeholder{color:var(--text3)}
.memo-save-btn{position:absolute;bottom:8px;right:8px;background:var(--accent);color:#fff;border-radius:8px;padding:5px 14px;font-size:13px;font-weight:700}
.memo-save-btn:active{opacity:.8}
.voice-bar{display:flex;align-items:center;gap:10px;margin-top:10px;background:var(--surface);border:1.5px solid var(--border2);border-radius:var(--rsm);padding:10px 14px}
.voice-btn{width:40px;height:40px;border-radius:50%;flex-shrink:0;background:var(--bg3);border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:18px;transition:background .15s}
.voice-btn.listening{background:#e74c3c;border-color:#c0392b;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
.voice-guide{font-size:12px;color:var(--text3);padding:8px 0 4px;}
.memo-section-label{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;padding:18px 0 8px}
.memo-item{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--rsm);padding:12px 14px;margin-bottom:8px}
.memo-item-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.memo-item-date{font-size:11px;color:var(--text3)}
.memo-item-btns{display:flex;gap:6px}
.memo-edit-btn{font-size:11px;color:var(--accent);padding:2px 8px;border-radius:6px;background:#d4ebcc;border:1px solid var(--border)}
.memo-del-btn{font-size:11px;color:var(--text2);padding:2px 8px;border-radius:6px;background:var(--bg2);border:1px solid var(--border)}
.memo-item-text{font-size:16px;line-height:1.75;color:var(--text);white-space:pre-wrap;word-break:break-all}
.memo-edit-wrap{margin-top:8px;display:none}
.memo-edit-area{width:100%;min-height:80px;background:var(--bg);border:1.5px solid var(--accent);border-radius:var(--rsm);padding:8px 10px;font-size:16px;line-height:1.7;resize:none;outline:none;color:var(--text)}
.memo-edit-footer{display:flex;gap:6px;justify-content:flex-end;margin-top:6px}
.memo-save-edit-btn{font-size:12px;font-weight:700;color:#fff;background:var(--accent);border-radius:7px;padding:4px 12px}
.memo-cancel-btn{font-size:12px;color:var(--text2);background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:4px 10px}
.memo-empty{padding:32px 0;text-align:center;font-size:13px;color:var(--text3)}
.review-wrap{padding:14px 0}
.review-voice-bar{margin-bottom:10px}
.review-box{background:var(--surface);border:1.5px solid var(--border2);border-radius:var(--rsm);padding:14px}
.review-area{width:100%;min-height:240px;background:none;border:none;outline:none;resize:none;font-size:17px;line-height:1.8;color:var(--text)}
.review-area::placeholder{color:var(--text3)}
.review-count{font-size:11px;color:var(--text3);text-align:right;margin-top:8px;border-top:1px solid var(--border);padding-top:8px}
.del-book-btn{font-size:13px;color:var(--text2);padding:5px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg3)}
.del-book-btn:active{background:#fde8e8;color:var(--danger)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-end;justify-content:center;z-index:100}
.modal-bg.open{display:flex}
.modal{background:var(--bg);width:100%;max-width:480px;border-radius:24px 24px 0 0;border:1.5px solid var(--border2);border-bottom:none;padding:8px 24px 44px;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:10px auto 20px}
.modal-title{font-size:17px;font-weight:700;margin-bottom:20px}
.modal-field{margin-bottom:16px}
.modal-label{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.5px;margin-bottom:6px}
.modal-input{width:100%;border:none;border-bottom:1.5px solid var(--border2);padding:8px 0;font-size:16px;outline:none;background:none;color:var(--text)}
.modal-input:focus{border-bottom-color:var(--accent)}
.modal-input::placeholder{color:var(--text3)}
.modal-btn{width:100%;background:var(--accent);color:#fff;border-radius:14px;padding:15px;font-size:16px;font-weight:700;margin-top:8px;border:1.5px solid var(--border2)}
.modal-btn:active{opacity:.85}
.modal-cancel{width:100%;padding:12px;font-size:14px;color:var(--text2);margin-top:4px}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(30,50,25,.88);color:#fff;border-radius:20px;padding:9px 20px;font-size:13px;font-weight:500;white-space:nowrap;opacity:0;transition:opacity .25s;pointer-events:none;z-index:200}
.toast.show{opacity:1}
.md-content{font-size:16px;line-height:1.75;color:var(--text);word-break:break-word}
.md-content p{margin-bottom:10px}
.md-content p:last-child{margin-bottom:0}
.md-content ul,.md-content ol{margin-left:20px;margin-bottom:10px}
.md-content li{margin-bottom:4px}
.md-content blockquote{border-left:3px solid var(--accent);padding-left:10px;color:var(--text2);margin-bottom:10px}
.md-content code{background:var(--bg3);padding:2px 4px;border-radius:4px;font-family:monospace;font-size:13px}
.md-content pre{background:var(--bg2);padding:10px;border-radius:6px;overflow-x:auto;margin-bottom:10px}
.md-content pre code{background:none;padding:0;font-size:13px}
.md-content a{color:var(--accent);text-decoration:underline}
.md-content h1,.md-content h2,.md-content h3{margin-bottom:10px;font-weight:700}
.review-display{width:100%;min-height:240px;font-size:17px;line-height:1.8;color:var(--text);display:none;padding:4px}
</style>
</head>
<body>
<div class="app">

<div id="screen-list" class="screen active">
  <div class="header">

      <img src="./b_1.png" class="header-book-img" alt="">

        </div>
        <div class="field-block">
          <div class="field-label">저자</div>
          <input class="field-input" id="book-author-input" type="text" placeholder="저자 이름">
        </div>
      </div>
    </div>
    <div class="tab-bar">
      <button class="tab-btn on" id="tab-memo-btn">메모</button>
      <button class="tab-btn" id="tab-review-btn">독후감</button>
    </div>
    <div class="tab-pane on" id="tab-memo">
      <div class="memo-input-wrap">
        <textarea class="memo-textarea" id="memo-input" placeholder="기억하고 싶은 문장을 붙여넣거나 직접 입력하세요…"></textarea>
        <button class="memo-save-btn" id="btn-add-memo">저장</button>
      </div>

          <button id="btn-review-toggle" style="font-size:12px; font-weight:700; color:var(--accent); background:var(--bg3); padding:4px 10px; border-radius:6px">미리보기</button>

        <div class="review-box">
          <textarea class="review-area" id="review-input" placeholder="이 책을 읽고 떠오른 생각, 느낌, 배운 것들을 자유롭게 남겨보세요…"></textarea>

  </div>
</div>
</div>

<div class="modal-bg" id="add-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">새 책 추가</div>
    <div class="modal-field">
      <div class="modal-label">책 제목</div>
      <input class="modal-input" id="new-title" type="text" placeholder="제목을 입력하세요">
    </div>
    <div class="modal-field">
      <div class="modal-label">저자</div>
      <input class="modal-input" id="new-author" type="text" placeholder="저자 이름 (선택)">
    </div>
    <button class="modal-btn" id="btn-confirm-add">추가하기</button>
    <button class="modal-cancel" id="btn-cancel-add">취소</button>

</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, doc, onSnapshot, deleteDoc, updateDoc, addDoc, query, orderBy, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

let books=[], curId=null, saveTimer=null, reviewTimer=null, unsubBooks=null, unsubMemos=null;

const $  = id => document.getElementById(id);
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function linkify(text) {
  const urlRegex = /(https?:\/\/[^\s<>"]+)/g;
  return String(text).split(urlRegex).map((part, i) => {
    if (i % 2 === 1) {
      const escaped = esc(part);
      return '<a href="'+escaped+'" target="_blank" rel="noopener noreferrer" style="color:var(--accent);word-break:break-all;text-decoration:underline;">'+escaped+'</a>';
    }
    return esc(part);
  }).join('');
}

// KaTeX 수식 렌더링 헬퍼
const PURIFY_OPTS = {
  ADD_TAGS: ['math','mrow','mi','mn','mo','msup','msub','mfrac','msubsup',
             'mover','munder','moverunder','menclose','msqrt','mroot',
             'mtable','mtr','mtd','mtext','mspace','mphantom','semantics','annotation'],
  ADD_ATTR: ['xmlns','display','class','style','aria-hidden','focusable','role',
             'viewBox','width','height','preserveAspectRatio','fill','stroke',
             'stroke-width','d','x','y','x1','x2','y1','y2','cx','cy','r',
             'rx','ry','transform','points','encoding']
};
function renderMath(raw) {
  const blocks = [];
  let processed = raw
    .replace(/\$\$([\s\S]+?)\$\$/g, (_, expr) => {
      const i = blocks.length;
      blocks.push({ d: true, expr: expr.trim() });
      return `MATH_BLOCK_${i}_END`;
    })
    .replace(/\$([^$\n]+?)\$/g, (_, expr) => {
      const i = blocks.length;
      blocks.push({ d: false, expr: expr.trim() });
      return `MATH_INLINE_${i}_END`;
    });
  let html = marked.parse(processed, { breaks: true, gfm: true });
  if (window.katex) {
    html = html
      .replace(/MATH_BLOCK_(\d+)_END/g, (_, i) => {
        try { return katex.renderToString(blocks[i].expr, { displayMode: true,  throwOnError: false }); }
        catch(e) { return `<code>$$${blocks[i].expr}$$</code>`; }
      })
      .replace(/MATH_INLINE_(\d+)_END/g, (_, i) => {
        try { return katex.renderToString(blocks[i].expr, { displayMode: false, throwOnError: false }); }
        catch(e) { return `<code>$${blocks[i].expr}$</code>`; }
      });
  }
  return DOMPurify.sanitize(html, PURIFY_OPTS);
}
const p2  = n => String(n).padStart(2,'0');
const sd  = $('sync-dot');
const setSyncing = () => sd.className='sync-dot syncing';
const setSynced  = () => sd.className='sync-dot ok';
const setSyncErr = () => sd.className='sync-dot err';

function toast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }

function showScreen(n){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  $('screen-'+n).classList.add('active');
}

// ── 탭 ──
$('tab-memo-btn').addEventListener('click', ()=>{
  $('tab-memo-btn').classList.add('on'); $('tab-review-btn').classList.remove('on');
  $('tab-memo').classList.add('on');     $('tab-review').classList.remove('on');
});
$('tab-review-btn').addEventListener('click', ()=>{
  $('tab-review-btn').classList.add('on'); $('tab-memo-btn').classList.remove('on');
  $('tab-review').classList.add('on');     $('tab-memo').classList.remove('on');
});

// ── 책 목록 ──
function subscribeBooks(){
  setSyncing();
  unsubBooks = onSnapshot(query(collection(db,'books'),orderBy('createdAt','desc')), snap=>{
    books = snap.docs.map(d=>({id:d.id,...d.data()}));
    books.sort((a,b) => (b.isPinned ? 1 : 0) - (a.isPinned ? 1 : 0));
    setSynced(); renderList();
  }, ()=>setSyncErr());
}

function renderList(){
  const body=$('list-body');
  $('book-count-label').textContent='읽은 책 '+books.length+'권';
  if(!books.length){ body.innerHTML='<div class="empty-state"><div class="big-icon">📚</div><p>아직 책이 없어요.<br>첫 번째 책을 추가해볼까요?</p></div>'; return; }
  body.innerHTML = books.map(b=>{
    const thumb = b.cover ? '<div class="book-thumb"><img src="'+b.cover+'" alt=""></div>' : '<div class="book-thumb">📖</div>';
    const pinIcon = b.isPinned ? '<div style="color:#e74c3c; font-size:18px; margin-right:4px;">📌</div>' : '';
    return '<div class="book-row" data-id="'+b.id+'">'+thumb+
      '<div class="book-row-info">'+
        '<div class="book-row-title">'+esc(b.title||'제목 없음')+'</div>'+
        '<div class="book-row-author">'+esc(b.author||'저자 미상')+'</div>'+
        '<div class="book-row-meta">메모 '+(b.memoCount||0)+'개</div>'+
      '</div>' + pinIcon + '<div class="book-row-arrow">›</div></div>';
  }).join('');
  body.querySelectorAll('.book-row').forEach(row=>{
    row.addEventListener('click', ()=>openBook(row.dataset.id));
  });
}

// ── 책 열기 ──
function openBook(id){
  curId=id;
  const b=books.find(x=>x.id===id); if(!b) return;
  $('book-title-input').value = b.title||'';
  $('book-author-input').value = b.author||'';

  const pinBtn = $('btn-pin-book');
  if (pinBtn) {
    pinBtn.textContent = b.isPinned ? '📌 해제' : '📌 고정';
    pinBtn.style.color = b.isPinned ? 'var(--danger)' : 'var(--text2)';
    pinBtn.style.background = b.isPinned ? '#fde8e8' : 'var(--bg3)';
  }

  const img=$('cover-img'), hint=$('cover-hint');
  if(b.cover){ img.src=b.cover; img.style.display='block'; hint.style.display='none'; }
  else { img.style.display='none'; hint.style.display='flex'; }
  subscribeMemos(id);
  $('review-input').value = b.review||'';
  $('review-count').textContent = (b.review||'').length+'자';
  $('review-input').style.display = 'block';
  $('review-display').style.display = 'none';
  if($('btn-review-toggle')) $('btn-review-toggle').textContent = '미리보기';
  $('tab-memo-btn').click();
  showScreen('detail');
  history.pushState({page:'detail'}, '');
}

function goList(){
  if(unsubMemos){ unsubMemos(); unsubMemos=null; }
  stopVoice('memo'); stopVoice('review');
  showScreen('list');
}
// btn-back은 popstate에서 처리

// ── 새 책 모달 ──
function openModal(){ $('new-title').value=''; $('new-author').value=''; $('add-modal').classList.add('open'); setTimeout(()=>$('new-title').focus(),100); }
function closeModal(){ $('add-modal').classList.remove('open'); }
$('fab-add').addEventListener('click', openModal);
$('btn-cancel-add').addEventListener('click', closeModal);
$('add-modal').addEventListener('click', e=>{ if(e.target===$('add-modal')) closeModal(); });
$('new-title').addEventListener('keydown', e=>{ if(e.key==='Enter') addBook(); });

async function addBook(){
  const title=$('new-title').value.trim(); if(!title){ $('new-title').focus(); return; }
  setSyncing();
  try{
    const ref=await addDoc(collection(db,'books'),{title,author:$('new-author').value.trim(),cover:null,review:'',memoCount:0,createdAt:serverTimestamp()});
    closeModal(); openBook(ref.id); toast('책이 추가됐어요'); setSynced();
  }catch(e){ setSyncErr(); toast('저장 실패: '+e.message); }
}
$('btn-confirm-add').addEventListener('click', addBook);

async function deleteBook(){
  if(!confirm('이 책의 모든 내용이 삭제됩니다. 계속할까요?')) return;
  setSyncing();
  try{ await deleteDoc(doc(db,'books',curId)); goList(); toast('삭제됐어요'); setSynced(); }
  catch(e){ setSyncErr(); toast('삭제 실패'); }
}
$('btn-del-book').addEventListener('click', deleteBook);

$('btn-pin-book').addEventListener('click', async () => {
  if(!curId) return;
  const b = books.find(x=>x.id===curId);
  const newPinned = !b.isPinned;
  setSyncing();
  try {
    await updateDoc(doc(db,'books',curId), { isPinned: newPinned });
    b.isPinned = newPinned;
    const pinBtn = $('btn-pin-book');
    if (pinBtn) {
      pinBtn.textContent = newPinned ? '📌 해제' : '📌 고정';
      pinBtn.style.color = newPinned ? 'var(--danger)' : 'var(--text2)';
      pinBtn.style.background = newPinned ? '#fde8e8' : 'var(--bg3)';
    }
    books.sort((a,b) => (b.isPinned ? 1 : 0) - (a.isPinned ? 1 : 0));
    renderList();
    setSynced();
    toast(newPinned ? '핀으로 고정했습니다' : '핀 고정을 해제했습니다');
  } catch(e) {
    setSyncErr(); toast('상태 변경 실패');
  }
});

// ── 제목/저자 자동 저장 ──
function debounceSave(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    if(!curId) return; setSyncing();
    try{ await updateDoc(doc(db,'books',curId),{title:$('book-title-input').value,author:$('book-author-input').value}); setSynced(); }
    catch(e){ setSyncErr(); }
  },800);
}
$('book-title-input').addEventListener('input', debounceSave);
$('book-author-input').addEventListener('input', debounceSave);

// ── 표지 ──
$('cover-file').addEventListener('change', function(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=async ev=>{
    const img=$('cover-img'), hint=$('cover-hint');
    img.src=ev.target.result; img.style.display='block'; hint.style.display='none';
    setSyncing();
    try{ await updateDoc(doc(db,'books',curId),{cover:ev.target.result}); setSynced(); toast('표지가 저장됐어요'); }
    catch(e){ setSyncErr(); toast('표지 저장 실패'); }
  };
  reader.readAsDataURL(file);
});

// ── 메모 구독 (오래된 순 = asc) ──
function subscribeMemos(bookId){
  if(unsubMemos){ unsubMemos(); unsubMemos=null; }
  unsubMemos=onSnapshot(query(collection(db,'books',bookId,'memos'),orderBy('createdAt','asc')), snap=>{
    renderMemos(snap.docs.map(d=>({id:d.id,...d.data()})));
  });
}

function renderMemos(memos){
  const list=$('memo-list'), lbl=$('memo-count-label');
  if(!list||!lbl) return;
  lbl.textContent='메모 '+memos.length+'개';
  if(!memos.length){ list.innerHTML='<div class="memo-empty">아직 메모가 없어요</div>'; return; }
  list.innerHTML=memos.map(m=>{
    const d=m.createdAt?m.createdAt.toDate():new Date();
    const ds=d.getFullYear()+'.'+p2(d.getMonth()+1)+'.'+p2(d.getDate())+' '+p2(d.getHours())+':'+p2(d.getMinutes());
    return '<div class="memo-item" id="mi-'+m.id+'">'+
      '<div class="memo-item-head">'+
        '<span class="memo-item-date">'+ds+'</span>'+
        '<div class="memo-item-btns">'+
          '<button class="memo-edit-btn" data-id="'+m.id+'">수정</button>'+
          '<button class="memo-del-btn"  data-id="'+m.id+'">삭제</button>'+
        '</div>'+
      '</div>'+
      '<div class="memo-item-text md-content" id="mt-'+m.id+'">'+renderMath(m.text)+'</div>'+
      '<div class="memo-edit-wrap" id="mew-'+m.id+'" style="display:none">'+
        '<textarea class="memo-edit-area" id="mta-'+m.id+'">'+esc(m.text)+'</textarea>'+
        '<div class="memo-edit-footer">'+
          '<button class="memo-cancel-btn"    data-id="'+m.id+'">취소</button>'+
          '<button class="memo-save-edit-btn" data-id="'+m.id+'">저장</button>'+
        '</div>'+
      '</div>'+
    '</div>';
  }).join('');

  list.querySelectorAll('.memo-edit-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const id=btn.dataset.id;
      $('mt-'+id).style.display='none';
      $('mew-'+id).style.display='block';
      $('mta-'+id).focus();
    });
  });
  list.querySelectorAll('.memo-cancel-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const id=btn.dataset.id;
      $('mt-'+id).style.display='block';
      $('mew-'+id).style.display='none';
    });
  });
  list.querySelectorAll('.memo-save-edit-btn').forEach(btn=>{
    btn.addEventListener('click', async()=>{
      const id=btn.dataset.id;
      const text=$('mta-'+id).value.trim(); if(!text) return;
      setSyncing();
      try{ await updateDoc(doc(db,'books',curId,'memos',id),{text}); setSynced(); toast('메모가 수정됐어요'); }
      catch(e){ setSyncErr(); toast('수정 실패'); }
    });
  });
  list.querySelectorAll('.memo-del-btn').forEach(btn=>{
    btn.addEventListener('click', async()=>{
      if(!confirm('이 메모를 삭제할까요?')) return;
      const id=btn.dataset.id; setSyncing();
      try{
        await deleteDoc(doc(db,'books',curId,'memos',id));
        const b=books.find(x=>x.id===curId);
        await updateDoc(doc(db,'books',curId),{memoCount:Math.max(0,(b?b.memoCount||1:1)-1)});
        setSynced(); toast('메모가 삭제됐어요');
      }catch(e){ setSyncErr(); toast('삭제 실패'); }
    });
  });
}

// ── 메모 추가 ──
async function addMemo(){
  const inp=$('memo-input'), text=inp.value.trim(); if(!text||!curId) return;
  setSyncing();
  try{
    await addDoc(collection(db,'books',curId,'memos'),{text,createdAt:serverTimestamp()});
    const b=books.find(x=>x.id===curId);
    await updateDoc(doc(db,'books',curId),{memoCount:(b?b.memoCount||0:0)+1});
    inp.value=''; setSynced(); toast('메모가 저장됐어요');
  }catch(e){ setSyncErr(); toast('저장 실패'); }
}
$('btn-add-memo').addEventListener('click', addMemo);
$('memo-input').addEventListener('keydown', e=>{ if(e.key==='Enter'&&(e.ctrlKey||e.metaKey)) addMemo(); });

// ── 독후감 ──
function debounceReview(){
  const rv=$('review-input');
  $('review-count').textContent=rv.value.length+'자';
  clearTimeout(reviewTimer);
  reviewTimer=setTimeout(async()=>{
    if(!curId) return; setSyncing();
    try{ await updateDoc(doc(db,'books',curId),{review:rv.value}); setSynced(); toast('독후감이 저장됐어요'); }
    catch(e){ setSyncErr(); }
  },1000);
}
$('review-input').addEventListener('input', debounceReview);

// ── 독후감 미리보기 토글 ──
if($('btn-review-toggle')) {
  $('btn-review-toggle').addEventListener('click', ()=>{
    const isEdit = $('review-input').style.display !== 'none';
    if(isEdit){
      $('review-input').style.display = 'none';
      $('review-display').innerHTML = renderMath($('review-input').value);
      $('review-display').style.display = 'block';
      $('btn-review-toggle').textContent = '수정';
    } else {
      $('review-input').style.display = 'block';
      $('review-display').style.display = 'none';
      $('btn-review-toggle').textContent = '미리보기';
    }
  });
}

// ── 음성 인식 ──
function stopVoice(target){
  if(voiceRec[target]){ voiceRec[target].abort(); voiceRec[target]=null; }
  voiceOn[target]=false;
  const btn=$(target+'-voice-btn'), st=$(target+'-voice-status');
  if(btn){ btn.classList.remove('listening'); btn.textContent='🎤'; }
  if(st){ st.textContent='키보드 마이크로 입력하세요'; st.classList.remove('active'); }
}

function startVoice(target){
  const ta=$(target==='memo'?'memo-input':'review-input');
  const st=$(target+'-voice-status');
  ta.focus();
  st.textContent='키보드 마이크 버튼을 눌러 말씀하세요';
}

subscribeBooks();

// ── 안드로이드 뒤로가기 처리 ──
history.pushState({page:'list'}, '');

window.addEventListener('popstate', e => {
  const detail = $('screen-detail');
  if(detail && detail.classList.contains('active')) {
    goList();
    history.pushState({page:'list'}, '');
  }
});

$('btn-back').addEventListener('click', () => {
  goList();
  history.pushState({page:'list'}, '');
});</script>
